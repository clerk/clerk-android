name: Manual Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_api:
        description: "Publish clerk-api module"
        required: false
        type: boolean
        default: true
      publish_ui:
        description: "Publish clerk-ui module"
        required: false
        type: boolean
        default: true
      publish_telemetry:
        description: "Publish clerk-telemetry module"
        required: false
        type: boolean
        default: true

jobs:
  create-release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for tags

      - name: Get versions from gradle.properties
        id: get_version
        run: |
          CLERK_API_VERSION=$(awk -F= '/^CLERK_API_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')
          CLERK_TELEMETRY_VERSION=$(awk -F= '/^CLERK_TELEMETRY_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')
          CLERK_UI_VERSION=$(awk -F= '/^CLERK_UI_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')

          if [ -z "$CLERK_API_VERSION" ] || [ -z "$CLERK_TELEMETRY_VERSION" ] || [ -z "$CLERK_UI_VERSION" ]; then
            echo "Failed to read Clerk release versions from gradle.properties"
            exit 1
          fi

          # Use clerk-api version for the tag
          TAG_NAME="v$CLERK_API_VERSION"

          echo "version=$CLERK_API_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_api_version=$CLERK_API_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_telemetry_version=$CLERK_TELEMETRY_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_ui_version=$CLERK_UI_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          echo "Found versions:"
          echo "  clerk-android-api: $CLERK_API_VERSION"
          echo "  clerk-android-telemetry: $CLERK_TELEMETRY_VERSION"
          echo "  clerk-android-ui: $CLERK_UI_VERSION"
          echo "Tag name: $TAG_NAME"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.get_version.outputs.tag_name }}
          git push origin ${{ steps.get_version.outputs.tag_name }}

      - name: Get previous tag
        id: get_previous_tag
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREVIOUS_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.tag_name }}
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  expo-compat:
    name: "@clerk/expo compat (Maestro)"
    runs-on: ubuntu-latest
    needs: create-release
    if: always() && (github.event_name == 'release' || needs.create-release.result == 'success')
    # Release gate: verifies the SDK version about to be published does not
    # break @clerk/expo. If any Maestro flow fails, the publish step below
    # will not run.
    env:
      SDK_SNAPSHOT_SUFFIX: "-expo-compat-${{ github.run_id }}"
      JAVASCRIPT_REPO_REF: "main"
      QUICKSTART_REPO_REF: "main"
    steps:
      - name: Checkout clerk-android
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compute snapshot versions
        id: versions
        run: |
          API_VERSION="$(awk -F= '/^CLERK_API_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')${SDK_SNAPSHOT_SUFFIX}"
          UI_VERSION="$(awk -F= '/^CLERK_UI_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')${SDK_SNAPSHOT_SUFFIX}"
          TELEMETRY_VERSION="$(awk -F= '/^CLERK_TELEMETRY_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')${SDK_SNAPSHOT_SUFFIX}"
          echo "api=$API_VERSION" >> "$GITHUB_OUTPUT"
          echo "ui=$UI_VERSION" >> "$GITHUB_OUTPUT"
          echo "telemetry=$TELEMETRY_VERSION" >> "$GITHUB_OUTPUT"

      - name: Patch gradle.properties with snapshot suffix
        run: |
          sed -i "s/^CLERK_API_VERSION=.*/CLERK_API_VERSION=${{ steps.versions.outputs.api }}/" gradle.properties
          sed -i "s/^CLERK_UI_VERSION=.*/CLERK_UI_VERSION=${{ steps.versions.outputs.ui }}/" gradle.properties
          sed -i "s/^CLERK_TELEMETRY_VERSION=.*/CLERK_TELEMETRY_VERSION=${{ steps.versions.outputs.telemetry }}/" gradle.properties

      - name: Publish clerk-android snapshot to mavenLocal
        run: ./gradlew :source:api:publishToMavenLocal :source:ui:publishToMavenLocal :source:telemetry:publishToMavenLocal -x signMavenPublication

      - name: Checkout @clerk/javascript
        uses: actions/checkout@v4
        with:
          repository: clerk/javascript
          ref: ${{ env.JAVASCRIPT_REPO_REF }}
          path: javascript

      - name: Checkout clerk-expo-quickstart
        uses: actions/checkout@v4
        with:
          repository: clerk/clerk-expo-quickstart
          ref: ${{ env.QUICKSTART_REPO_REF }}
          path: clerk-expo-quickstart

      - name: Patch @clerk/expo android build.gradle to use snapshot
        working-directory: javascript
        run: |
          # Pin @clerk/expo to the snapshot versions we just published
          sed -i "s/clerkAndroidApiVersion = \".*\"/clerkAndroidApiVersion = \"${{ steps.versions.outputs.api }}\"/" packages/expo/android/build.gradle
          sed -i "s/clerkAndroidUiVersion = \".*\"/clerkAndroidUiVersion = \"${{ steps.versions.outputs.ui }}\"/" packages/expo/android/build.gradle

          # Add mavenLocal() to the repositories closure so gradle can resolve the snapshot
          # Expo autolinks via the root project's repositories; we add mavenLocal to that list.
          if ! grep -q "mavenLocal()" packages/expo/android/build.gradle; then
            sed -i '/^repositories\s*{/a \  mavenLocal()' packages/expo/android/build.gradle || true
          fi

          echo "=== Patched @clerk/expo build.gradle ==="
          grep -A 2 -B 2 "clerkAndroid\|mavenLocal" packages/expo/android/build.gradle | head -20

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: javascript/pnpm-lock.yaml

      - name: Install @clerk/javascript deps
        working-directory: javascript
        run: pnpm install --frozen-lockfile

      - name: Build @clerk/expo
        working-directory: javascript
        run: pnpm turbo build --filter=@clerk/expo...

      - name: Install quickstart deps
        working-directory: clerk-expo-quickstart/NativeComponentQuickstart
        run: pnpm install

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Android e2e
        uses: reactivecircus/android-emulator-runner@v2
        env:
          CLERK_TEST_EMAIL: ${{ secrets.CLERK_TEST_EMAIL }}
          CLERK_TEST_PASSWORD: ${{ secrets.CLERK_TEST_PASSWORD }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          script: |
            cd clerk-expo-quickstart/NativeComponentQuickstart
            npx expo prebuild --clean
            npx expo run:android --variant release --no-bundler
            cd ../../javascript/integration-mobile
            maestro test --exclude-tags iosOnly,manual,skip flows/

      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-compat
          path: ~/.maestro/tests

  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [create-release, expo-compat]
    if: always() && (github.event_name == 'release' || needs.create-release.result == 'success') && needs.expo-compat.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          TASKS=""

          # For release events, publish all modules. For workflow_dispatch, use the inputs.
          if [ "${{ github.event_name }}" == "release" ]; then
            TASKS=":source:api:publishAndReleaseToMavenCentral :source:ui:publishAndReleaseToMavenCentral :source:telemetry:publishAndReleaseToMavenCentral"
          else
            if [ "${{ github.event.inputs.publish_api }}" == "true" ]; then
              TASKS="$TASKS :source:api:publishMavenPublicationToMavenCentralRepository"
            fi
            if [ "${{ github.event.inputs.publish_ui }}" == "true" ]; then
              TASKS="$TASKS :source:ui:publishAndReleaseToMavenCentral"
            fi
            if [ "${{ github.event.inputs.publish_telemetry }}" == "true" ]; then
              TASKS="$TASKS :source:telemetry:publishAndReleaseToMavenCentral"
            fi
          fi

          if [ -z "$TASKS" ]; then
            echo "No modules selected for publishing"
            exit 1
          fi

          echo "Publishing modules: $TASKS"
          ./gradlew $TASKS
