name: Manual Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_api:
        description: "Publish clerk-api module"
        required: false
        type: boolean
        default: true
      publish_ui:
        description: "Publish clerk-ui module"
        required: false
        type: boolean
        default: true
      publish_telemetry:
        description: "Publish clerk-telemetry module"
        required: false
        type: boolean
        default: true

jobs:
  create-release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Fetch all history for tags

      - name: Get versions from gradle.properties
        id: get_version
        env:
          PUBLISH_API: ${{ github.event.inputs.publish_api }}
          PUBLISH_UI: ${{ github.event.inputs.publish_ui }}
          PUBLISH_TELEMETRY: ${{ github.event.inputs.publish_telemetry }}
        run: |
          CLERK_API_VERSION=$(awk -F= '/^CLERK_API_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')
          CLERK_TELEMETRY_VERSION=$(awk -F= '/^CLERK_TELEMETRY_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')
          CLERK_UI_VERSION=$(awk -F= '/^CLERK_UI_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')

          if [ -z "$CLERK_API_VERSION" ] || [ -z "$CLERK_TELEMETRY_VERSION" ] || [ -z "$CLERK_UI_VERSION" ]; then
            echo "Failed to read Clerk release versions from gradle.properties"
            exit 1
          fi

          if [ "$PUBLISH_API" != "true" ] && [ "$PUBLISH_UI" != "true" ] && [ "$PUBLISH_TELEMETRY" != "true" ]; then
            echo "No modules selected for publishing"
            exit 1
          fi

          # SDK releases use the API version. Telemetry-only releases use the telemetry version so
          # they can be published independently without colliding with SDK release tags.
          if [ "$PUBLISH_API" != "true" ] && [ "$PUBLISH_UI" != "true" ] && [ "$PUBLISH_TELEMETRY" = "true" ]; then
            TAG_NAME="telemetry-v$CLERK_TELEMETRY_VERSION"
            RELEASE_VERSION="$CLERK_TELEMETRY_VERSION"
          else
            TAG_NAME="v$CLERK_API_VERSION"
            RELEASE_VERSION="$CLERK_API_VERSION"
          fi

          echo "version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_api_version=$CLERK_API_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_telemetry_version=$CLERK_TELEMETRY_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_ui_version=$CLERK_UI_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          echo "Found versions:"
          echo "  clerk-android-api: $CLERK_API_VERSION"
          echo "  clerk-android-telemetry: $CLERK_TELEMETRY_VERSION"
          echo "  clerk-android-ui: $CLERK_UI_VERSION"
          echo "Selected modules:"
          echo "  clerk-android-api: $PUBLISH_API"
          echo "  clerk-android-telemetry: $PUBLISH_TELEMETRY"
          echo "  clerk-android-ui: $PUBLISH_UI"
          echo "Tag name: $TAG_NAME"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.get_version.outputs.tag_name }}
          git push origin ${{ steps.get_version.outputs.tag_name }}

      - name: Get previous tag
        id: get_previous_tag
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREVIOUS_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.tag_name }}
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: create-release
    if: always() && (github.event_name == 'release' || needs.create-release.result == 'success')
    outputs:
      tag_name: ${{ steps.release_metadata.outputs.tag_name }}
      release_url: ${{ steps.release_metadata.outputs.release_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get release metadata
        id: release_metadata
        env:
          EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          EVENT_RELEASE_URL: ${{ github.event.release.html_url }}
          DISPATCH_RELEASE_TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
          PUBLISH_API: ${{ github.event.inputs.publish_api }}
          PUBLISH_UI: ${{ github.event.inputs.publish_ui }}
          PUBLISH_TELEMETRY: ${{ github.event.inputs.publish_telemetry }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAG_NAME="$EVENT_RELEASE_TAG_NAME"
            RELEASE_URL="$EVENT_RELEASE_URL"
            TASKS=":source:api:publishAndReleaseToMavenCentral :source:ui:publishAndReleaseToMavenCentral :source:telemetry:publishAndReleaseToMavenCentral"
          else
            TAG_NAME="$DISPATCH_RELEASE_TAG_NAME"
            RELEASE_URL="https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG_NAME"
            TASKS=""

            if [ "$PUBLISH_API" = "true" ]; then
              TASKS="$TASKS :source:api:publishMavenPublicationToMavenCentralRepository"
            fi
            if [ "$PUBLISH_UI" = "true" ]; then
              TASKS="$TASKS :source:ui:publishAndReleaseToMavenCentral"
            fi
            if [ "$PUBLISH_TELEMETRY" = "true" ]; then
              TASKS="$TASKS :source:telemetry:publishAndReleaseToMavenCentral"
            fi

            TASKS="${TASKS# }"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "Failed to determine release tag"
            exit 1
          fi
          if [ -z "$RELEASE_URL" ]; then
            RELEASE_URL="https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG_NAME"
          fi
          if [ -z "$TASKS" ]; then
            echo "No modules selected for publishing"
            exit 1
          fi

          {
            echo "tag_name=$TAG_NAME"
            echo "release_url=$RELEASE_URL"
            echo "tasks=$TASKS"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          TASKS="${{ steps.release_metadata.outputs.tasks }}"
          echo "Publishing modules: $TASKS"
          ./gradlew $TASKS

  open-expo-android-release-pr:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: publish
    if: needs.publish.result == 'success' && (github.event_name == 'release' || (github.event.inputs.publish_api == 'true' && github.event.inputs.publish_ui == 'true'))
    outputs:
      pr_url: ${{ steps.pull_request.outputs.pr_url }}
    env:
      JAVASCRIPT_REPO: clerk/javascript
      RAW_ANDROID_VERSION: ${{ needs.publish.outputs.tag_name }}
      RELEASE_URL: ${{ needs.publish.outputs.release_url }}

    steps:
      - name: Checkout release source
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.publish.outputs.tag_name }}
          path: android-release

      - name: Prepare version metadata
        id: version
        working-directory: android-release
        run: |
          set -euo pipefail

          raw_version="$RAW_ANDROID_VERSION"

          if [[ ! "$raw_version" =~ ^v ]]; then
            echo "::notice::Skipping Expo PR because release ${raw_version} is not a clerk-android SDK release."
            echo "should_open=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          android_version="${raw_version#v}"

          if [[ ! "$android_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "Invalid version: '$raw_version'. Expected SemVer prefixed with v."
            exit 1
          fi

          clerk_api_version=$(awk -F= '/^CLERK_API_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')
          clerk_ui_version=$(awk -F= '/^CLERK_UI_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')

          if [ -z "$clerk_api_version" ] || [ -z "$clerk_ui_version" ]; then
            echo "::error::Failed to read CLERK_API_VERSION or CLERK_UI_VERSION from gradle.properties."
            exit 1
          fi

          if [ "$clerk_api_version" != "$android_version" ] || [ "$clerk_ui_version" != "$android_version" ]; then
            echo "::notice::Skipping Expo PR because release ${raw_version} does not match CLERK_API_VERSION (${clerk_api_version}) and CLERK_UI_VERSION (${clerk_ui_version})."
            echo "should_open=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$RELEASE_URL" ]; then
            RELEASE_URL="https://github.com/clerk/clerk-android/releases/tag/$raw_version"
          fi

          safe_version="$(printf '%s' "$android_version" | tr '.' '-' | tr -cs 'A-Za-z0-9_-' '-')"

          echo "should_open=true" >> "$GITHUB_OUTPUT"
          echo "android_version=$android_version" >> "$GITHUB_OUTPUT"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "branch_name=automation/expo-android-sdk-$safe_version" >> "$GITHUB_OUTPUT"
          echo "changeset_file=expo-bump-clerk-android-$safe_version.md" >> "$GITHUB_OUTPUT"

      - name: Verify JavaScript repo token
        if: steps.version.outputs.should_open == 'true'
        env:
          OPEN_EXPO_PR_GH_TOKEN: ${{ secrets.OPEN_EXPO_PR_GH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$OPEN_EXPO_PR_GH_TOKEN" ]; then
            echo "OPEN_EXPO_PR_GH_TOKEN must be configured with clerk/javascript contents and pull request write access."
            echo "Use a token that authenticates as clerk-cookie so the generated PR author is clerk-cookie."
            exit 1
          fi

      - name: Checkout clerk/javascript
        if: steps.version.outputs.should_open == 'true'
        uses: actions/checkout@v7
        with:
          repository: ${{ env.JAVASCRIPT_REPO }}
          ref: main
          path: javascript
          token: ${{ secrets.OPEN_EXPO_PR_GH_TOKEN }}

      - name: Wait for Maven Central artifacts
        if: steps.version.outputs.should_open == 'true'
        env:
          ANDROID_VERSION: ${{ steps.version.outputs.android_version }}
        run: |
          set -euo pipefail

          urls=(
            "https://repo.maven.apache.org/maven2/com/clerk/clerk-android-api/${ANDROID_VERSION}/clerk-android-api-${ANDROID_VERSION}.pom"
            "https://repo.maven.apache.org/maven2/com/clerk/clerk-android-ui/${ANDROID_VERSION}/clerk-android-ui-${ANDROID_VERSION}.pom"
          )

          for attempt in $(seq 1 60); do
            missing=0

            for url in "${urls[@]}"; do
              if ! curl --fail --silent --head --location "$url" >/dev/null; then
                missing=$((missing + 1))
              fi
            done

            if [ "$missing" -eq 0 ]; then
              echo "Maven Central has clerk-android-api and clerk-android-ui ${ANDROID_VERSION}."
              exit 0
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "::error::Timed out waiting for clerk-android ${ANDROID_VERSION} on Maven Central."
              exit 1
            fi

            echo "::notice::Waiting for ${missing} Maven Central artifact(s), attempt ${attempt}/60."
            sleep 30
          done

      - name: Update @clerk/expo Android SDK pin
        id: update
        if: steps.version.outputs.should_open == 'true'
        working-directory: javascript
        env:
          ANDROID_VERSION: ${{ steps.version.outputs.android_version }}
          RELEASE_URL: ${{ steps.version.outputs.release_url }}
          CHANGESET_FILE: ${{ steps.version.outputs.changeset_file }}
        run: |
          set -euo pipefail

          build_file="packages/expo/android/build.gradle"
          current_api_version="$(sed -nE 's/^[[:space:]]*clerkAndroidApiVersion[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "$build_file" | head -n 1)"
          current_ui_version="$(sed -nE 's/^[[:space:]]*clerkAndroidUiVersion[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "$build_file" | head -n 1)"

          if [ -z "$current_api_version" ] || [ -z "$current_ui_version" ]; then
            echo "Could not read clerk-android versions from $build_file"
            exit 1
          fi

          echo "current_api_version=$current_api_version" >> "$GITHUB_OUTPUT"
          echo "current_ui_version=$current_ui_version" >> "$GITHUB_OUTPUT"

          if [ "$current_api_version" = "$ANDROID_VERSION" ] && [ "$current_ui_version" = "$ANDROID_VERSION" ]; then
            echo "@clerk/expo already pins clerk-android $ANDROID_VERSION; no PR needed."
            echo "should_open=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node <<'NODE'
          const fs = require('fs');

          const buildFile = 'packages/expo/android/build.gradle';
          const androidVersion = process.env.ANDROID_VERSION;
          const source = fs.readFileSync(buildFile, 'utf8');
          const updated = source
            .replace(
              /(clerkAndroidApiVersion\s*=\s*")([^"]+)(")/,
              `$1${androidVersion}$3`,
            )
            .replace(
              /(clerkAndroidUiVersion\s*=\s*")([^"]+)(")/,
              `$1${androidVersion}$3`,
            );

          if (updated === source) {
            throw new Error(`Failed to update clerk-android versions in ${buildFile}`);
          }

          fs.writeFileSync(buildFile, updated);
          NODE

          if ! grep -q "clerkAndroidApiVersion = \"${ANDROID_VERSION}\"" "$build_file" ||
            ! grep -q "clerkAndroidUiVersion = \"${ANDROID_VERSION}\"" "$build_file"; then
            echo "Failed to update clerk-android Gradle pins."
            exit 1
          fi

          if [ "$current_api_version" = "$current_ui_version" ]; then
            previous_version="$current_api_version"
          else
            previous_version="${current_api_version} / ${current_ui_version}"
          fi

          mkdir -p .changeset
          cat > ".changeset/$CHANGESET_FILE" <<EOF
          ---
          '@clerk/expo': patch
          ---

          Bump the bundled \`clerk-android\` SDK (\`clerk-android-api\` and \`clerk-android-ui\`) from \`$previous_version\` to \`$ANDROID_VERSION\`. See the Clerk Android release: $RELEASE_URL.
          EOF

          echo "should_open=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        id: pull_request
        if: steps.update.outputs.should_open == 'true'
        working-directory: javascript
        env:
          GH_TOKEN: ${{ secrets.OPEN_EXPO_PR_GH_TOKEN }}
          BRANCH_NAME: ${{ steps.version.outputs.branch_name }}
          ANDROID_VERSION: ${{ steps.version.outputs.android_version }}
          RELEASE_URL: ${{ steps.version.outputs.release_url }}
          CHANGESET_FILE: ${{ steps.version.outputs.changeset_file }}
          CURRENT_API_VERSION: ${{ steps.update.outputs.current_api_version }}
          CURRENT_UI_VERSION: ${{ steps.update.outputs.current_ui_version }}
          JAVASCRIPT_REPO: ${{ env.JAVASCRIPT_REPO }}
        run: |
          set -euo pipefail

          if [ "$CURRENT_API_VERSION" = "$CURRENT_UI_VERSION" ]; then
            previous_version="$CURRENT_API_VERSION"
          else
            previous_version="${CURRENT_API_VERSION} / ${CURRENT_UI_VERSION}"
          fi

          git config user.name "clerk-cookie"
          git config user.email "cookie@clerk.dev"
          git checkout -B "$BRANCH_NAME"
          git add packages/expo/android/build.gradle ".changeset/$CHANGESET_FILE"

          if git diff --cached --quiet; then
            echo "No changes to commit; no PR needed."
            exit 0
          fi

          git commit -m "chore(expo): bump clerk-android to $ANDROID_VERSION"
          git push --force-with-lease origin "$BRANCH_NAME"

          pr_title="chore(expo): bump clerk-android to $ANDROID_VERSION"
          pr_body="$(mktemp)"
          cat > "$pr_body" <<EOF
          ## Description

          Bumps the bundled \`clerk-android\` SDK in \`@clerk/expo\` from \`$previous_version\` to \`$ANDROID_VERSION\`.

          Release: $RELEASE_URL

          ## Checklist

          - JavaScript repo CI will run on the PR.
          - Not applicable: JSDoc comments or documentation updates.

          ## Type of change

          Refactoring / dependency upgrade / documentation
          EOF

          existing_pr="$(gh pr list \
            --repo "$JAVASCRIPT_REPO" \
            --head "$BRANCH_NAME" \
            --state open \
            --json url \
            --jq '.[0].url // ""')"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --title "$pr_title" --body-file "$pr_body"
            echo "Updated existing PR: $existing_pr"
            pr_url="$existing_pr"
          else
            pr_url="$(gh pr create \
              --repo "$JAVASCRIPT_REPO" \
              --base main \
              --head "$BRANCH_NAME" \
              --title "$pr_title" \
              --body-file "$pr_body")"
          fi

          if ! gh pr edit "$pr_url" --add-reviewer wobsoriano; then
            echo "::warning::Could not request review from wobsoriano; continuing without a reviewer."
          fi

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

  notify-slack:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [publish, open-expo-android-release-pr]
    if: always() && needs.publish.result == 'success'

    steps:
      - name: Notify Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag_name }}
          RELEASE_URL: ${{ needs.publish.outputs.release_url }}
          PR_URL: ${{ needs.open-expo-android-release-pr.outputs.pr_url }}
        run: |
          set -euo pipefail

          context_links="<${RELEASE_URL}|View the GitHub release>"
          if [ -n "$PR_URL" ]; then
            context_links="$context_links · <$PR_URL|View the Expo bump PR>"
          fi

          PAYLOAD=$(jq -n \
            --arg channel "$SLACK_CHANNEL_ID" \
            --arg tag "$RELEASE_TAG" \
            --arg context_links "$context_links" \
            '
            {
              channel: $channel,
              text: "Clerk Android SDK \($tag) has been released",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*Clerk Android SDK \($tag) has been released*"
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: $context_links
                    }
                  ]
                }
              ]
            }')

          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            response=$(
              curl --silent --show-error --fail-with-body \
                --request POST \
                --header "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
                --header "Content-type: application/json" \
                --data "$PAYLOAD" \
                "https://slack.com/api/chat.postMessage"
            ) || {
              echo "::warning::Failed to post Slack release notification"
              exit 0
            }

            if [ "$(jq -r '.ok' <<<"$response")" != "true" ]; then
              echo "::warning::Slack rejected release notification: $(jq -r '.error // "unknown_error"' <<<"$response")"
              exit 0
            fi

            exit 0
          fi

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_BOT_TOKEN and SLACK_CHANNEL_ID are not configured; falling back to webhook release notification"
            webhook_payload=$(jq 'del(.channel)' <<<"$PAYLOAD")
            curl --silent --show-error --fail-with-body \
              --request POST \
              --header "Content-type: application/json" \
              --data "$webhook_payload" \
              "$SLACK_WEBHOOK_URL" || {
                echo "::warning::Failed to post Slack release notification with webhook"
                exit 0
              }
            exit 0
          fi

          echo "::warning::Slack notification secrets are not configured; skipping Slack notification"
