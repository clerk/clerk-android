name: Manual Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_api:
        description: "Publish clerk-api module"
        required: false
        type: boolean
        default: true
      publish_ui:
        description: "Publish clerk-ui module"
        required: false
        type: boolean
        default: true
      publish_telemetry:
        description: "Publish clerk-telemetry module"
        required: false
        type: boolean
        default: true

jobs:
  create-release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Fetch all history for tags

      - name: Get versions from gradle.properties
        id: get_version
        env:
          PUBLISH_API: ${{ github.event.inputs.publish_api }}
          PUBLISH_UI: ${{ github.event.inputs.publish_ui }}
          PUBLISH_TELEMETRY: ${{ github.event.inputs.publish_telemetry }}
        run: |
          CLERK_API_VERSION=$(awk -F= '/^CLERK_API_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')
          CLERK_TELEMETRY_VERSION=$(awk -F= '/^CLERK_TELEMETRY_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')
          CLERK_UI_VERSION=$(awk -F= '/^CLERK_UI_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')

          if [ -z "$CLERK_API_VERSION" ] || [ -z "$CLERK_TELEMETRY_VERSION" ] || [ -z "$CLERK_UI_VERSION" ]; then
            echo "Failed to read Clerk release versions from gradle.properties"
            exit 1
          fi

          if [ "$PUBLISH_API" != "true" ] && [ "$PUBLISH_UI" != "true" ] && [ "$PUBLISH_TELEMETRY" != "true" ]; then
            echo "No modules selected for publishing"
            exit 1
          fi

          # SDK releases use the API version. Telemetry-only releases use the telemetry version so
          # they can be published independently without colliding with SDK release tags.
          if [ "$PUBLISH_API" != "true" ] && [ "$PUBLISH_UI" != "true" ] && [ "$PUBLISH_TELEMETRY" = "true" ]; then
            TAG_NAME="telemetry-v$CLERK_TELEMETRY_VERSION"
            RELEASE_VERSION="$CLERK_TELEMETRY_VERSION"
          else
            TAG_NAME="v$CLERK_API_VERSION"
            RELEASE_VERSION="$CLERK_API_VERSION"
          fi

          echo "version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_api_version=$CLERK_API_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_telemetry_version=$CLERK_TELEMETRY_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_ui_version=$CLERK_UI_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          echo "Found versions:"
          echo "  clerk-android-api: $CLERK_API_VERSION"
          echo "  clerk-android-telemetry: $CLERK_TELEMETRY_VERSION"
          echo "  clerk-android-ui: $CLERK_UI_VERSION"
          echo "Selected modules:"
          echo "  clerk-android-api: $PUBLISH_API"
          echo "  clerk-android-telemetry: $PUBLISH_TELEMETRY"
          echo "  clerk-android-ui: $PUBLISH_UI"
          echo "Tag name: $TAG_NAME"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.get_version.outputs.tag_name }}
          git push origin ${{ steps.get_version.outputs.tag_name }}

      - name: Get previous tag
        id: get_previous_tag
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREVIOUS_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.tag_name }}
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: create-release
    if: always() && (github.event_name == 'release' || needs.create-release.result == 'success')
    outputs:
      tag_name: ${{ steps.release_metadata.outputs.tag_name }}
      release_url: ${{ steps.release_metadata.outputs.release_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get release metadata
        id: release_metadata
        env:
          EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          EVENT_RELEASE_URL: ${{ github.event.release.html_url }}
          DISPATCH_RELEASE_TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
          PUBLISH_API: ${{ github.event.inputs.publish_api }}
          PUBLISH_UI: ${{ github.event.inputs.publish_ui }}
          PUBLISH_TELEMETRY: ${{ github.event.inputs.publish_telemetry }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAG_NAME="$EVENT_RELEASE_TAG_NAME"
            RELEASE_URL="$EVENT_RELEASE_URL"
            TASKS=":source:api:publishAndReleaseToMavenCentral :source:ui:publishAndReleaseToMavenCentral :source:telemetry:publishAndReleaseToMavenCentral"
          else
            TAG_NAME="$DISPATCH_RELEASE_TAG_NAME"
            RELEASE_URL="https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG_NAME"
            TASKS=""

            if [ "$PUBLISH_API" = "true" ]; then
              TASKS="$TASKS :source:api:publishMavenPublicationToMavenCentralRepository"
            fi
            if [ "$PUBLISH_UI" = "true" ]; then
              TASKS="$TASKS :source:ui:publishAndReleaseToMavenCentral"
            fi
            if [ "$PUBLISH_TELEMETRY" = "true" ]; then
              TASKS="$TASKS :source:telemetry:publishAndReleaseToMavenCentral"
            fi

            TASKS="${TASKS# }"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "Failed to determine release tag"
            exit 1
          fi
          if [ -z "$RELEASE_URL" ]; then
            RELEASE_URL="https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG_NAME"
          fi
          if [ -z "$TASKS" ]; then
            echo "No modules selected for publishing"
            exit 1
          fi

          {
            echo "tag_name=$TAG_NAME"
            echo "release_url=$RELEASE_URL"
            echo "tasks=$TASKS"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          TASKS="${{ steps.release_metadata.outputs.tasks }}"
          echo "Publishing modules: $TASKS"
          ./gradlew $TASKS

  notify-slack:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: publish
    if: needs.publish.result == 'success'
    outputs:
      channel_id: ${{ steps.post_release_message.outputs.channel_id }}
      thread_ts: ${{ steps.post_release_message.outputs.thread_ts }}

    steps:
      - name: Notify Slack
        id: post_release_message
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag_name }}
          RELEASE_URL: ${{ needs.publish.outputs.release_url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg channel "$SLACK_CHANNEL_ID" \
            --arg tag "$RELEASE_TAG" \
            --arg release_url "$RELEASE_URL" \
            '{
              channel: $channel,
              text: "Clerk Android SDK \($tag) has been released",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*Clerk Android SDK \($tag) has been released*"
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: "<\($release_url)|View the GitHub release>"
                    }
                  ]
                }
              ]
            }')

          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            response=$(
              curl --silent --show-error --fail-with-body \
                --request POST \
                --header "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
                --header "Content-type: application/json" \
                --data "$PAYLOAD" \
                "https://slack.com/api/chat.postMessage"
            ) || {
              echo "::warning::Failed to post Slack release notification; skipping threaded Expo PR notification"
              exit 0
            }

            if [ "$(jq -r '.ok' <<<"$response")" != "true" ]; then
              echo "::warning::Slack rejected release notification: $(jq -r '.error // "unknown_error"' <<<"$response")"
              exit 0
            fi

            thread_ts=$(jq -r '.ts // ""' <<<"$response")
            channel_id=$(jq -r --arg fallback "$SLACK_CHANNEL_ID" '.channel // $fallback' <<<"$response")

            if [ -z "$thread_ts" ]; then
              echo "::warning::Slack release notification did not return a thread timestamp"
              exit 0
            fi

            {
              echo "channel_id=$channel_id"
              echo "thread_ts=$thread_ts"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_BOT_TOKEN and SLACK_CHANNEL_ID are required for threaded Expo PR notifications; falling back to webhook release notification"
            webhook_payload=$(jq 'del(.channel)' <<<"$PAYLOAD")
            curl --silent --show-error --fail-with-body \
              --request POST \
              --header "Content-type: application/json" \
              --data "$webhook_payload" \
              "$SLACK_WEBHOOK_URL" || {
                echo "::warning::Failed to post Slack release notification with webhook"
                exit 0
              }
            exit 0
          fi

          echo "::warning::Slack notification secrets are not configured; skipping Slack notification"

  open-expo-android-release-pr:
    needs: publish
    if: needs.publish.result == 'success' && (github.event_name == 'release' || (github.event.inputs.publish_api == 'true' && github.event.inputs.publish_ui == 'true'))
    uses: ./.github/workflows/expo-android-release-pr.yml
    with:
      release_tag: ${{ needs.publish.outputs.tag_name }}
      release_url: ${{ needs.publish.outputs.release_url }}
    secrets:
      OPEN_EXPO_PR_GH_TOKEN: ${{ secrets.OPEN_EXPO_PR_GH_TOKEN }}

  notify-expo-android-release-pr:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - publish
      - notify-slack
      - open-expo-android-release-pr
    if: always() && needs.publish.result == 'success' && needs.notify-slack.result == 'success' && needs.open-expo-android-release-pr.result == 'success' && needs.notify-slack.outputs.thread_ts != '' && needs.open-expo-android-release-pr.outputs.pr_url != ''

    steps:
      - name: Notify Slack about Expo PR
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ needs.notify-slack.outputs.channel_id }}
          SLACK_THREAD_TS: ${{ needs.notify-slack.outputs.thread_ts }}
          EXPO_PR_URL: ${{ needs.open-expo-android-release-pr.outputs.pr_url }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag_name }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL_ID" ] || [ -z "$SLACK_THREAD_TS" ]; then
            echo "::warning::Slack thread details are not configured; skipping Expo PR Slack notification"
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg channel "$SLACK_CHANNEL_ID" \
            --arg thread_ts "$SLACK_THREAD_TS" \
            --arg pr_url "$EXPO_PR_URL" \
            --arg tag "$RELEASE_TAG" \
            '{
              channel: $channel,
              thread_ts: $thread_ts,
              reply_broadcast: true,
              text: "Expo Android SDK update PR for \($tag): \($pr_url)",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*Expo Android SDK update PR for \($tag)*\n<\($pr_url)|View the clerk/javascript PR>"
                  }
                }
              ]
            }')

          response=$(
            curl --silent --show-error --fail-with-body \
              --request POST \
              --header "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              --header "Content-type: application/json" \
              --data "$PAYLOAD" \
              "https://slack.com/api/chat.postMessage"
          ) || {
            echo "::warning::Failed to post Expo PR Slack notification"
            exit 0
          }

          if [ "$(jq -r '.ok' <<<"$response")" != "true" ]; then
            echo "::warning::Slack rejected Expo PR notification: $(jq -r '.error // "unknown_error"' <<<"$response")"
          fi
