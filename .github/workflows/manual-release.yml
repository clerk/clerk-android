name: Manual Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_api:
        description: "Publish clerk-api module"
        required: false
        type: boolean
        default: true
      publish_ui:
        description: "Publish clerk-ui module"
        required: false
        type: boolean
        default: true
      publish_telemetry:
        description: "Publish clerk-telemetry module"
        required: false
        type: boolean
        default: true
      skip_expo_compat:
        description: "Skip the @clerk/expo compat gate (emergency override only)"
        required: false
        type: boolean
        default: false
      skip_reason:
        description: "Reason for skipping compat gate (required when skip=true)"
        required: false
        type: string

jobs:
  create-release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for tags

      - name: Get versions from gradle.properties
        id: get_version
        run: |
          CLERK_API_VERSION=$(awk -F= '/^CLERK_API_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')
          CLERK_TELEMETRY_VERSION=$(awk -F= '/^CLERK_TELEMETRY_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')
          CLERK_UI_VERSION=$(awk -F= '/^CLERK_UI_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')

          if [ -z "$CLERK_API_VERSION" ] || [ -z "$CLERK_TELEMETRY_VERSION" ] || [ -z "$CLERK_UI_VERSION" ]; then
            echo "Failed to read Clerk release versions from gradle.properties"
            exit 1
          fi

          # Use clerk-api version for the tag
          TAG_NAME="v$CLERK_API_VERSION"

          echo "version=$CLERK_API_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_api_version=$CLERK_API_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_telemetry_version=$CLERK_TELEMETRY_VERSION" >> $GITHUB_OUTPUT
          echo "clerk_ui_version=$CLERK_UI_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          echo "Found versions:"
          echo "  clerk-android-api: $CLERK_API_VERSION"
          echo "  clerk-android-telemetry: $CLERK_TELEMETRY_VERSION"
          echo "  clerk-android-ui: $CLERK_UI_VERSION"
          echo "Tag name: $TAG_NAME"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.get_version.outputs.tag_name }}
          git push origin ${{ steps.get_version.outputs.tag_name }}

      - name: Get previous tag
        id: get_previous_tag
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREVIOUS_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.tag_name }}
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  log-skip:
    name: "Log gate skip (emergency override)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.skip_expo_compat == true
    steps:
      - name: Fail if skip invoked without a reason
        if: ${{ !inputs.skip_reason }}
        run: |
          echo "::error::skip_expo_compat=true requires skip_reason to be provided"
          exit 1
      - name: Record skip to the job summary
        run: |
          {
            echo "## ⚠️ Expo compat gate skipped"
            echo ""
            echo "- Actor: @${{ github.triggering_actor }}"
            echo "- Reason: ${{ inputs.skip_reason }}"
            echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

  expo-compat:
    name: "@clerk/expo compat (Maestro)"
    runs-on: ubuntu-latest
    needs: create-release
    timeout-minutes: 60
    if: |
      always()
      && (github.event_name == 'release' || needs.create-release.result == 'success')
      && !(github.event_name == 'workflow_dispatch' && inputs.skip_expo_compat == true)
    # Release gate: dispatches the mobile-e2e.yml workflow in clerk/javascript
    # against this commit and waits for it to finish. The dispatched run is the
    # single source of truth for the @clerk/expo native test pipeline — keeping
    # the implementation there avoids duplicating the build/Maestro steps in
    # two repos and prevents drift.
    #
    # Requires the JAVASCRIPT_REPO_DISPATCH_TOKEN secret on this repo: a PAT or
    # GitHub App token with actions:write on clerk/javascript. No CLERK_TEST_*
    # or instance-key secrets are needed here — those live in clerk/javascript.
    #
    # Emergency override: maintainers can skip this gate by setting
    # skip_expo_compat=true AND providing skip_reason on workflow_dispatch.
    # The skip is recorded permanently in the Actions run log.
    env:
      SDK_SNAPSHOT_SUFFIX: "-expo-compat-${{ github.run_id }}"
      JAVASCRIPT_REPO_REF: "main"
    steps:
      - name: Dispatch mobile-e2e in clerk/javascript
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.JAVASCRIPT_REPO_DISPATCH_TOKEN }}
        run: |
          # Record the dispatch time so we can find our run via the `created`
          # filter — gh workflow run doesn't return a run id directly.
          dispatch_time="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "dispatch_time=$dispatch_time" >> "$GITHUB_OUTPUT"

          gh workflow run mobile-e2e.yml \
            -R clerk/javascript \
            -r "$JAVASCRIPT_REPO_REF" \
            -f clerk_android_ref="$GITHUB_SHA" \
            -f clerk_android_snapshot_suffix="$SDK_SNAPSHOT_SUFFIX"

      - name: Resolve dispatched run id
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.JAVASCRIPT_REPO_DISPATCH_TOKEN }}
          DISPATCH_TIME: ${{ steps.dispatch.outputs.dispatch_time }}
        run: |
          # Poll for a workflow_dispatch run on mobile-e2e.yml created after
          # our dispatch time. Two-minute window is enough for the run to
          # register; if no run shows up, something is wrong with the token
          # or workflow file.
          run_id=""
          for i in $(seq 1 24); do
            sleep 5
            run_id=$(gh api \
              "repos/clerk/javascript/actions/workflows/mobile-e2e.yml/runs?event=workflow_dispatch&created=%3E${DISPATCH_TIME}" \
              --jq '.workflow_runs | sort_by(.created_at) | .[-1].id // empty')
            if [ -n "$run_id" ]; then
              echo "Found dispatched run: $run_id"
              break
            fi
          done
          if [ -z "$run_id" ]; then
            echo "::error::Could not find dispatched mobile-e2e run in clerk/javascript within 2 minutes"
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "run_url=https://github.com/clerk/javascript/actions/runs/$run_id" >> "$GITHUB_OUTPUT"

      - name: Link to dispatched run in job summary
        run: |
          {
            echo "## @clerk/expo compat (Maestro)"
            echo ""
            echo "Dispatched: ${{ steps.resolve.outputs.run_url }}"
            echo ""
            echo "clerk-android ref: \`$GITHUB_SHA\`"
            echo "Snapshot suffix: \`${SDK_SNAPSHOT_SUFFIX}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for dispatched run to complete
        env:
          GH_TOKEN: ${{ secrets.JAVASCRIPT_REPO_DISPATCH_TOKEN }}
        run: |
          gh run watch ${{ steps.resolve.outputs.run_id }} \
            -R clerk/javascript \
            --exit-status

  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [create-release, expo-compat, log-skip]
    # Publish when:
    #   - create-release succeeded (or we got a release event), AND
    #   - expo-compat succeeded, OR the gate was explicitly skipped via
    #     workflow_dispatch with skip_expo_compat=true and a reason.
    if: |
      always()
      && (github.event_name == 'release' || needs.create-release.result == 'success')
      && (
        needs.expo-compat.result == 'success'
        || (github.event_name == 'workflow_dispatch' && inputs.skip_expo_compat == true && needs.log-skip.result == 'success')
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          TASKS=""

          # For release events, publish all modules. For workflow_dispatch, use the inputs.
          if [ "${{ github.event_name }}" == "release" ]; then
            TASKS=":source:api:publishAndReleaseToMavenCentral :source:ui:publishAndReleaseToMavenCentral :source:telemetry:publishAndReleaseToMavenCentral"
          else
            if [ "${{ github.event.inputs.publish_api }}" == "true" ]; then
              TASKS="$TASKS :source:api:publishMavenPublicationToMavenCentralRepository"
            fi
            if [ "${{ github.event.inputs.publish_ui }}" == "true" ]; then
              TASKS="$TASKS :source:ui:publishAndReleaseToMavenCentral"
            fi
            if [ "${{ github.event.inputs.publish_telemetry }}" == "true" ]; then
              TASKS="$TASKS :source:telemetry:publishAndReleaseToMavenCentral"
            fi
          fi

          if [ -z "$TASKS" ]; then
            echo "No modules selected for publishing"
            exit 1
          fi

          echo "Publishing modules: $TASKS"
          ./gradlew $TASKS
