name: Open Expo Android Release PR

on:
  workflow_dispatch:
    inputs:
      clerk_android_version:
        description: "clerk-android version to pin in @clerk/expo. Defaults to gradle.properties."
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag that published clerk-android."
        required: true
        type: string
      release_url:
        description: "URL for the clerk-android release."
        required: true
        type: string
    secrets:
      OPEN_EXPO_PR_GH_TOKEN:
        required: true

permissions:
  contents: read

concurrency:
  group: expo-android-release-pr-${{ inputs.release_tag || inputs.clerk_android_version || github.run_id }}
  cancel-in-progress: false

jobs:
  open-pr:
    name: Open clerk/javascript PR
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout release source
        if: github.event_name == 'workflow_call'
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
          path: android-release

      - name: Checkout release source
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          path: android-release

      - name: Resolve clerk-android version
        id: release
        working-directory: android-release
        env:
          INPUT_VERSION: ${{ inputs.clerk_android_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_URL: ${{ inputs.release_url }}
        run: |
          set -euo pipefail

          clerk_api_version=$(awk -F= '/^CLERK_API_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')
          clerk_ui_version=$(awk -F= '/^CLERK_UI_VERSION=/{print $2}' gradle.properties | tr -d '[:space:]')

          if [ -z "$clerk_api_version" ] || [ -z "$clerk_ui_version" ]; then
            echo "::error::Failed to read CLERK_API_VERSION or CLERK_UI_VERSION from gradle.properties."
            exit 1
          fi

          if [ -n "${RELEASE_TAG:-}" ]; then
            if [[ ! "$RELEASE_TAG" =~ ^v ]]; then
              echo "::notice::Skipping Expo PR because release ${RELEASE_TAG} is not a clerk-android SDK release."
              echo "should_open=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            version="${RELEASE_TAG#v}"
            release_url="${RELEASE_URL:-https://github.com/clerk/clerk-android/releases/tag/${RELEASE_TAG}}"

            if [ "$clerk_api_version" != "$version" ] || [ "$clerk_ui_version" != "$version" ]; then
              echo "::notice::Skipping Expo PR because release ${RELEASE_TAG} does not match CLERK_API_VERSION (${clerk_api_version}) and CLERK_UI_VERSION (${clerk_ui_version})."
              echo "should_open=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif [ -z "${INPUT_VERSION:-}" ] && [ "$clerk_api_version" != "$clerk_ui_version" ]; then
            echo "::notice::Skipping Expo PR because CLERK_API_VERSION (${clerk_api_version}) and CLERK_UI_VERSION (${clerk_ui_version}) differ."
            echo "should_open=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            version="${INPUT_VERSION:-$clerk_api_version}"
            release_url="https://github.com/clerk/clerk-android/releases/tag/v${version}"
          fi

          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z]+)*$ ]]; then
            echo "::error::Invalid clerk-android version: ${version}"
            exit 1
          fi

          {
            echo "should_open=true"
            echo "version=${version}"
            echo "release_url=${release_url}"
          } >> "$GITHUB_OUTPUT"

      - name: Check target repository token
        if: steps.release.outputs.should_open == 'true'
        env:
          JAVASCRIPT_RELEASE_TOKEN: ${{ secrets.OPEN_EXPO_PR_GH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${JAVASCRIPT_RELEASE_TOKEN:-}" ]; then
            echo "::error::Set OPEN_EXPO_PR_GH_TOKEN with access to push branches and open PRs in clerk/javascript."
            exit 1
          fi

      - name: Checkout clerk/javascript
        if: steps.release.outputs.should_open == 'true'
        uses: actions/checkout@v6
        with:
          repository: clerk/javascript
          ref: main
          token: ${{ secrets.OPEN_EXPO_PR_GH_TOKEN }}
          path: javascript
          fetch-depth: 0

      - name: Open or update Expo Android release PR
        if: steps.release.outputs.should_open == 'true'
        env:
          CLERK_ANDROID_VERSION: ${{ steps.release.outputs.version }}
          CLERK_ANDROID_RELEASE_URL: ${{ steps.release.outputs.release_url }}
          GH_TOKEN: ${{ secrets.OPEN_EXPO_PR_GH_TOKEN }}
          JAVASCRIPT_DIR: ${{ github.workspace }}/javascript
        run: bash android-release/.github/scripts/open-expo-android-release-pr.sh
