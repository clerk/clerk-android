- config:
    id: clerk/e2e/oauth-profile
    target: clerk-e2e
    platform: android
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
    tags:
      - manual
      - oauth
      - user-profile
- tools:
    - launchApp:
        appId: com.clerk.e2e
        launchMode: REINSTALL
- prompts:
    - verify: The Clerk Android E2E home screen is visible and the OAuth entry point is available.
    - step: Start Google OAuth sign-in from the E2E app.
    - step: Complete Google OAuth in the browser with an existing Google account, approve any provider prompts, and return to the Clerk Android E2E app.
    - verify: The prebuilt user profile account screen is visible after OAuth sign-in.
    - step: Open manage account, verify connected account profile details, return to the account screen, and sign out.
