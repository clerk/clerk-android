- config:
    id: clerk/e2e/oauth-profile
    target: clerk-e2e
    platform: android
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
    tags:
      - manual
      - oauth
      - user-profile
- tools:
    - launchApp:
        appId: com.clerk.e2e
        launchMode: REINSTALL
- prompts:
    - verify: The Clerk Android E2E home screen is visible and the OAuth entry point is available.
      recording:
        tools:
          - assertVisibleBySelector:
              reason: Verify the e2e app home screen is loaded.
              nodeSelector:
                androidAccessibility:
                  textRegex: Clerk Android E2E
          - assertVisibleBySelector:
              reason: Verify the OAuth entry point is visible.
              nodeSelector:
                androidAccessibility:
                  textRegex: OAuth Sign In
    - step: Start Google OAuth sign-in from the E2E app.
      recording:
        tools:
          - tapOnElementBySelector:
              reason: Start the OAuth sign-in flow.
              nodeSelector:
                androidAccessibility:
                  textRegex: OAuth Sign In
          - assertVisibleBySelector:
              reason: Verify the OAuth sign-in screen is open.
              nodeSelector:
                androidAccessibility:
                  textRegex: OAuth Sign In
          - tapOnElementBySelector:
              reason: Start Google OAuth.
              nodeSelector:
                androidAccessibility:
                  textRegex: Sign in with Google
