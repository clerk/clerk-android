- config:
    id: clerk/e2e/oauth-profile
    target: clerk-e2e
    platform: android
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
    tags:
      - manual
      - oauth
      - user-profile
- tools:
    - launchApp:
        appId: com.clerk.e2e
        launchMode: REINSTALL
- prompts:
    - verify: The Clerk Android E2E home screen is visible and the OAuth entry point is available.
      recording:
        tools:
          - assertVisibleBySelector:
              reason: Verify the e2e app home screen is loaded.
              nodeSelector:
                androidAccessibility:
                  textRegex: Clerk Android E2E
          - assertVisibleBySelector:
              reason: Verify the OAuth entry point is visible.
              nodeSelector:
                androidAccessibility:
                  textRegex: OAuth Sign In
    - step: Start Google OAuth sign-in from the E2E app.
      recording:
        tools:
          - tapOnElementBySelector:
              reason: Start the OAuth sign-in flow.
              nodeSelector:
                androidAccessibility:
                  textRegex: OAuth Sign In
          - assertVisibleBySelector:
              reason: Verify the OAuth sign-in screen is open.
              nodeSelector:
                androidAccessibility:
                  textRegex: OAuth Sign In
          - tapOnElementBySelector:
              reason: Start Google OAuth.
              nodeSelector:
                androidAccessibility:
                  textRegex: Sign in with Google
    - step: Complete Google OAuth in the browser with an existing Google account, approve any provider prompts, and return to the Clerk Android E2E app.
    - verify: The prebuilt user profile account screen is visible after OAuth sign-in.
      recording:
        tools:
          - assertVisibleBySelector:
              reason: Verify the prebuilt user profile account screen is shown after OAuth.
              nodeSelector:
                androidAccessibility:
                  textRegex: Account
    - step: Open manage account, verify connected account profile details, return to the account screen, and sign out.
      recording:
        tools:
          - tapOnElementBySelector:
              reason: Open the prebuilt manage account screen.
              nodeSelector:
                androidAccessibility:
                  textRegex: Manage account
          - assertVisibleBySelector:
              reason: Verify the prebuilt manage account screen opened.
              nodeSelector:
                androidAccessibility:
                  textRegex: Manage account
          - assertVisibleBySelector:
              reason: Verify connected account profile details are visible.
              nodeSelector:
                androidAccessibility:
                  textRegex: CONNECTED ACCOUNTS
          - pressBack: {}
          - assertVisibleBySelector:
              reason: Verify the profile account root is visible again.
              nodeSelector:
                androidAccessibility:
                  textRegex: Account
          - tapOnElementBySelector:
              reason: Sign out through the prebuilt user profile.
              nodeSelector:
                androidAccessibility:
                  textRegex: Sign out
          - assertVisibleBySelector:
              reason: Verify sign-out returned to the e2e home screen.
              nodeSelector:
                androidAccessibility:
                  textRegex: Clerk Android E2E
